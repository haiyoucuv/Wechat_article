<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐟 Boids 群集模拟 - 沙丁鱼风暴</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            background: linear-gradient(to bottom, #001f3f, #003366);
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }
        .controls {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #fff;
            background: rgba(0, 20, 40, 0.85);
            padding: 20px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(78, 205, 196, 0.3);
            z-index: 100;
            min-width: 220px;
        }
        .controls h3 {
            margin-bottom: 15px;
            font-size: 16px;
            color: #4ECDC4;
            border-bottom: 1px solid rgba(78, 205, 196, 0.3);
            padding-bottom: 10px;
        }
        .control-group {
            margin-bottom: 15px;
        }
        .control-group label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 13px;
            color: #a0d2db;
        }
        .control-group label span {
            color: #4ECDC4;
            font-weight: bold;
        }
        .control-group input[type="range"] {
            width: 100%;
            height: 6px;
            -webkit-appearance: none;
            background: rgba(78, 205, 196, 0.2);
            border-radius: 3px;
            outline: none;
        }
        .control-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: #4ECDC4;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .control-group input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }
        .tips {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(78, 205, 196, 0.3);
            font-size: 12px;
            color: #6ba8a3;
            line-height: 1.6;
        }
        .tips strong {
            color: #4ECDC4;
        }
        .stats {
            position: fixed;
            top: 20px;
            right: 20px;
            color: #fff;
            background: rgba(0, 20, 40, 0.85);
            padding: 15px 20px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(78, 205, 196, 0.3);
            font-size: 14px;
            z-index: 100;
        }
        .stats span {
            color: #4ECDC4;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div class="controls">
        <h3>🎮 参数调节</h3>
        <div class="control-group">
            <label>鱼群数量 <span id="countVal">100</span></label>
            <input type="range" id="countSlider" min="20" max="500" value="100">
        </div>
        <div class="control-group">
            <label>分离力 <span id="sepVal">1.5</span></label>
            <input type="range" id="sepSlider" min="0" max="5" step="0.1" value="1.5">
        </div>
        <div class="control-group">
            <label>对齐力 <span id="aliVal">1.0</span></label>
            <input type="range" id="aliSlider" min="0" max="5" step="0.1" value="1.0">
        </div>
        <div class="control-group">
            <label>凝聚力 <span id="cohVal">1.0</span></label>
            <input type="range" id="cohSlider" min="0" max="5" step="0.1" value="1.0">
        </div>
        <div class="control-group">
            <label>感知范围 <span id="visVal">50</span></label>
            <input type="range" id="visSlider" min="20" max="150" value="50">
        </div>
        <div class="tips">
            <strong>💡 操作提示：</strong><br>
            • 点击画面惊吓鱼群<br>
            • 按住鼠标吸引鱼群<br>
            • 调参观察不同效果
        </div>
    </div>
    
    <div class="stats">
        FPS: <span id="fps">60</span>
    </div>

    <script>
    // ============================================
    // Boids 群集算法演示
    // 模拟自然界鱼群、鸟群的群体行为
    // ============================================

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    // 设置画布大小
    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    // ============================================
    // 向量类 - Boids 算法的核心工具
    // ============================================
    class Vector {
        constructor(x = 0, y = 0) {
            this.x = x;
            this.y = y;
        }
        
        add(v) { this.x += v.x; this.y += v.y; return this; }
        sub(v) { this.x -= v.x; this.y -= v.y; return this; }
        mult(n) { this.x *= n; this.y *= n; return this; }
        div(n) { if (n !== 0) { this.x /= n; this.y /= n; } return this; }
        
        mag() { return Math.sqrt(this.x * this.x + this.y * this.y); }
        
        normalize() {
            const m = this.mag();
            if (m > 0) this.div(m);
            return this;
        }
        
        limit(max) {
            if (this.mag() > max) {
                this.normalize().mult(max);
            }
            return this;
        }
        
        setMag(n) { return this.normalize().mult(n); }
        
        copy() { return new Vector(this.x, this.y); }
        
        static dist(v1, v2) {
            const dx = v1.x - v2.x;
            const dy = v1.y - v2.y;
            return Math.sqrt(dx * dx + dy * dy);
        }
        
        static sub(v1, v2) {
            return new Vector(v1.x - v2.x, v1.y - v2.y);
        }
    }

    // ============================================
    // Boid 类 - 单个"鱼"的行为
    // ============================================
    class Boid {
        constructor(x, y) {
            this.position = new Vector(x, y);
            this.velocity = new Vector(
                (Math.random() - 0.5) * 4,
                (Math.random() - 0.5) * 4
            );
            this.acceleration = new Vector(0, 0);
            this.maxSpeed = 4;
            this.maxForce = 0.15;
            this.size = 8;
            
            // 随机颜色变化
            this.hue = 170 + Math.random() * 20; // 青色系
        }
        
        // 边界环绕
        edges() {
            if (this.position.x > canvas.width + this.size) this.position.x = -this.size;
            if (this.position.x < -this.size) this.position.x = canvas.width + this.size;
            if (this.position.y > canvas.height + this.size) this.position.y = -this.size;
            if (this.position.y < -this.size) this.position.y = canvas.height + this.size;
        }
        
        // ===== Boids 三大规则 =====
        
        // 规则1：分离 - 避免与邻居碰撞
        separation(boids, perception) {
            let steering = new Vector(0, 0);
            let total = 0;
            
            for (let other of boids) {
                const d = Vector.dist(this.position, other.position);
                if (other !== this && d < perception * 0.5) {
                    let diff = Vector.sub(this.position, other.position);
                    diff.div(d * d); // 距离越近，排斥力越大
                    steering.add(diff);
                    total++;
                }
            }
            
            if (total > 0) {
                steering.div(total);
                steering.setMag(this.maxSpeed);
                steering.sub(this.velocity);
                steering.limit(this.maxForce);
            }
            
            return steering;
        }
        
        // 规则2：对齐 - 与邻居保持相同方向
        alignment(boids, perception) {
            let steering = new Vector(0, 0);
            let total = 0;
            
            for (let other of boids) {
                const d = Vector.dist(this.position, other.position);
                if (other !== this && d < perception) {
                    steering.add(other.velocity);
                    total++;
                }
            }
            
            if (total > 0) {
                steering.div(total);
                steering.setMag(this.maxSpeed);
                steering.sub(this.velocity);
                steering.limit(this.maxForce);
            }
            
            return steering;
        }
        
        // 规则3：凝聚 - 向邻居中心移动
        cohesion(boids, perception) {
            let steering = new Vector(0, 0);
            let total = 0;
            
            for (let other of boids) {
                const d = Vector.dist(this.position, other.position);
                if (other !== this && d < perception) {
                    steering.add(other.position);
                    total++;
                }
            }
            
            if (total > 0) {
                steering.div(total);
                steering = this.seek(steering);
            }
            
            return steering;
        }
        
        // 辅助：向目标点移动
        seek(target) {
            let desired = Vector.sub(target, this.position);
            desired.setMag(this.maxSpeed);
            let steering = Vector.sub(desired, this.velocity);
            steering.limit(this.maxForce);
            return steering;
        }
        
        // 逃避目标
        flee(target, radius) {
            const d = Vector.dist(this.position, target);
            if (d < radius) {
                let desired = Vector.sub(this.position, target);
                desired.setMag(this.maxSpeed * 2);
                let steering = Vector.sub(desired, this.velocity);
                steering.limit(this.maxForce * 3);
                return steering;
            }
            return new Vector(0, 0);
        }
        
        // 应用所有规则
        flock(boids, params) {
            const sep = this.separation(boids, params.perception).mult(params.sepWeight);
            const ali = this.alignment(boids, params.perception).mult(params.aliWeight);
            const coh = this.cohesion(boids, params.perception).mult(params.cohWeight);
            
            this.acceleration.add(sep);
            this.acceleration.add(ali);
            this.acceleration.add(coh);
        }
        
        // 更新位置
        update() {
            this.velocity.add(this.acceleration);
            this.velocity.limit(this.maxSpeed);
            this.position.add(this.velocity);
            this.acceleration.mult(0); // 重置加速度
            this.edges();
        }
        
        // 绘制小鱼
        draw() {
            const angle = Math.atan2(this.velocity.y, this.velocity.x);
            const speed = this.velocity.mag();
            
            ctx.save();
            ctx.translate(this.position.x, this.position.y);
            ctx.rotate(angle);
            
            // 身体
            ctx.beginPath();
            ctx.moveTo(this.size * 1.5, 0);
            ctx.lineTo(-this.size, -this.size * 0.6);
            ctx.quadraticCurveTo(-this.size * 0.3, 0, -this.size, this.size * 0.6);
            ctx.closePath();
            
            // 根据速度调整颜色亮度
            const lightness = 45 + speed * 5;
            ctx.fillStyle = `hsl(${this.hue}, 70%, ${lightness}%)`;
            ctx.fill();
            
            // 尾巴
            ctx.beginPath();
            ctx.moveTo(-this.size * 0.5, 0);
            ctx.lineTo(-this.size * 1.5, -this.size * 0.4);
            ctx.lineTo(-this.size * 1.2, 0);
            ctx.lineTo(-this.size * 1.5, this.size * 0.4);
            ctx.closePath();
            ctx.fillStyle = `hsl(${this.hue}, 60%, ${lightness - 10}%)`;
            ctx.fill();
            
            ctx.restore();
        }
    }

    // ============================================
    // 主程序
    // ============================================
    
    let flock = [];
    let params = {
        sepWeight: 1.5,
        aliWeight: 1.0,
        cohWeight: 1.0,
        perception: 50
    };
    
    let mouse = { x: 0, y: 0, active: false, attract: false };
    let lastTime = performance.now();
    let frameCount = 0;
    let fps = 60;

    function initFlock(count) {
        flock = [];
        for (let i = 0; i < count; i++) {
            flock.push(new Boid(
                Math.random() * canvas.width,
                Math.random() * canvas.height
            ));
        }
    }

    function animate(currentTime) {
        // 计算 FPS
        frameCount++;
        if (currentTime - lastTime >= 1000) {
            fps = frameCount;
            frameCount = 0;
            lastTime = currentTime;
            document.getElementById('fps').textContent = fps;
        }
        
        // 绘制半透明背景（产生拖尾效果）
        ctx.fillStyle = 'rgba(0, 31, 63, 0.2)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // 更新和绘制所有鱼
        for (let boid of flock) {
            boid.flock(flock, params);
            
            // 鼠标交互
            if (mouse.active) {
                const mouseVec = new Vector(mouse.x, mouse.y);
                if (mouse.attract) {
                    // 吸引
                    const attract = boid.seek(mouseVec).mult(2);
                    boid.acceleration.add(attract);
                } else {
                    // 逃避
                    const flee = boid.flee(mouseVec, 150);
                    boid.acceleration.add(flee);
                }
            }
            
            boid.update();
            boid.draw();
        }
        
        requestAnimationFrame(animate);
    }

    // 初始化
    initFlock(100);
    animate(performance.now());

    // ============================================
    // 事件监听
    // ============================================
    
    // 点击 - 惊吓
    canvas.addEventListener('mousedown', (e) => {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
        mouse.active = true;
        mouse.attract = false;
    });
    
    // 右键 - 吸引
    canvas.addEventListener('contextmenu', (e) => {
        e.preventDefault();
        mouse.x = e.clientX;
        mouse.y = e.clientY;
        mouse.active = true;
        mouse.attract = true;
    });
    
    canvas.addEventListener('mouseup', () => {
        mouse.active = false;
    });
    
    canvas.addEventListener('mousemove', (e) => {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
    });
    
    // 滑块控制
    document.getElementById('countSlider').addEventListener('input', (e) => {
        const val = parseInt(e.target.value);
        document.getElementById('countVal').textContent = val;
        initFlock(val);
    });
    
    document.getElementById('sepSlider').addEventListener('input', (e) => {
        params.sepWeight = parseFloat(e.target.value);
        document.getElementById('sepVal').textContent = params.sepWeight.toFixed(1);
    });
    
    document.getElementById('aliSlider').addEventListener('input', (e) => {
        params.aliWeight = parseFloat(e.target.value);
        document.getElementById('aliVal').textContent = params.aliWeight.toFixed(1);
    });
    
    document.getElementById('cohSlider').addEventListener('input', (e) => {
        params.cohWeight = parseFloat(e.target.value);
        document.getElementById('cohVal').textContent = params.cohWeight.toFixed(1);
    });
    
    document.getElementById('visSlider').addEventListener('input', (e) => {
        params.perception = parseInt(e.target.value);
        document.getElementById('visVal').textContent = params.perception;
    });
    </script>
</body>
</html>
